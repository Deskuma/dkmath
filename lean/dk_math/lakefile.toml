name = "dk_math"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["DkMath"]
testDriver = "DkMathTest"

[leanOptions]
pp.unicode.fun = true                 # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.28.0"

[[lean_lib]]
name = "DkMath"

[[lean_lib]]
name = "DkMathTest"
globs = ["DkMathTest.+"]

[[lean_lib]]
name = "DkMathlib"
globs = ["DkMathlib.+"]
